<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>beIN SPORTS — F1 Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="900">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <div class="header">
      <div class="header-top">
        <div class="brand-text">beIN SPORTS</div>
        <div class="status">
          <div class="clock" id="clock">--:--</div>
          <div class="updated" id="updated-at"><span class="dot"></span>Loading…</div>
        </div>
      </div>
      <div class="header-title">
        <div class="eyebrow">2026 Season</div>
        <h1>FORMULA 1</h1>
      </div>
    </div>

    <div class="main-content">
      <div class="section" id="last-race-section"></div>
      <div class="standings-section" id="standings-section"></div>
      <div class="next-gp-hero" id="next-gp-hero"></div>
    </div>

    <div class="footer">
      <div>beIN SPORTS &middot; Formula 1 2026</div>
      <div>All times SGT</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
